<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://www.vilinko.com/style/vina.min.test.css">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f3f4f6;
            /* 修改 1: 让背景小圆点更明显一点点 (#e5e7eb -> #d1d5db) */
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .error-container {
            width: 90%;
            max-width: 500px;
            background-color: #ffffff;
            border: 1px solid #e5e7eb; 
            border-radius: 12px;  
            padding: 40px;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            z-index: 10;
        }

        .error-content {
            margin-bottom: 30px;
            text-align: center;
        }

        .error-code {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(3.5rem, 15vw, 7rem);
            font-weight: 800;
            color: #5279fb;
            margin: 0 0 10px 0;
            line-height: 1;
        }

        .error-code img {
            height: 1.2em;
            width: auto;
            transform: translateX(0.1em);
            margin: 0 2px;
            display: block;
        }

        .error-message {
            font-size: 1.25rem;
            color: #4b5563;
            line-height: 1.6;
            font-weight: 400;
            margin: 0;
        }

        .kbd-key {
            display: inline-block;
            padding: 2px 8px;
            font-family: inherit;
            font-size: 0.8em;
            font-weight: 600;
            line-height: 1;
            color: #374151;
            background-color: #f9fafb;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-shadow: 0 2px 0 #d1d5db;
            margin: 0 4px;
            vertical-align: middle;
        }

        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

     .vina-button-fix {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            text-align: center !important;
            min-width: 140px;
            height: 48px;
            padding: 0 24px !important;
            text-decoration: none;
        }

        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        #player-ghost {
            position: fixed;
            width: 80px;
            height: 80px;
            left: 50%;
            bottom: -100px;
            transform: translateX(-50%);
            transition: bottom 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 20;
            display: none;
        }

        .game-active .error-container {
            transform: translateY(120vh);
            opacity: 0;
        }

        .score-board {
            position: fixed;
            top: 20px;
            font-size: 2rem;
            font-weight: bold;
            color: #5279fb;
            display: none;
            z-index: 100;
        }
        
        .chaos-active {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(2px,2px); }
            50% { transform: translate(-2px,0); }
            75% { transform: translate(2px,-2px); }
            100% { transform: translate(0,0); }
        }

        .copyright {
            position: fixed;
            bottom: 10px;
            font-size: 12px;
            color: #9ca3af;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="error-container" id="main-container">
        <div class="error-content">
            <h1 class="error-code" id="display-code">
                4 <img src="https://www.vilinko.com/res/img/test.svg" alt="0"> 4
            </h1>
            <p class="error-message" id="display-msg">
                Sorry, the page you looking for could not be found.<br>
            </p>
        </div>

        <div class="action-area">
            <a href="https://www.vilinko.com/" class="vina-control vina-button vina-button-primary vina-button-fix">
                Back Home
            </a>
        </div>
    </div>

    <img src="https://www.vilinko.com/res/img/cute_ghost.png" id="player-ghost" alt="ghost">
    
    <canvas id="game-canvas"></canvas>
    <div id="score" class="score-board">0</div>

    <div class="copyright">Copyright © Vilinko.All rights reserved.</div>

    <script>
        const container = document.getElementById('main-container');
        const ghost = document.getElementById('player-ghost');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const displayCode = document.getElementById('display-code');
        const displayMsg = document.getElementById('display-msg');

        let gameState = 'IDLE';
        let score = 0;
        let animationId;
        let isChaosMode = false;
        let isMidasMode = false; // 新增：点金手模式标记
        let chaosTimer = null;
        let midasTimer = null;   // 新增：点金手计时器

        let py = 0; 
        let px = 0; 
        let vy = 0; 
        const gravity = 0.15;      
        const flyPowerKbd = -0.45; 
        const flyPowerTouch = -0.40;
        const maxSpeed = 8;         
        const moveSpeed = 7;
        const touchCruiseSpeed = -3.5; 
        
        let lastActionX = null; 
        const sensitivity = 1.0; 

        let obstacles = [];
        let coins = []; 
        let candies = []; 
        let particles = []; 
        let frameCount = 0;
        const keys = {};

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        function handleActionStart(e) {
            if (e.target.closest('a')) return;

            if (e.touches && e.touches[0]) {
                lastActionX = e.touches[0].clientX;
            } else {
                lastActionX = e.clientX;
            }

            if (gameState === 'IDLE') {
                startTransition();
            } else if (gameState === 'PLAYING') {
                keys['Action'] = true;
            } else if (gameState === 'GAME OVER') {
                location.reload(); 
            }
            if (e.cancelable) e.preventDefault();
        }

        function handleActionMove(e) {
            if (gameState === 'PLAYING' && lastActionX !== null) {
                let currentX;
                if (e.touches && e.touches[0]) {
                    currentX = e.touches[0].clientX;
                } else {
                    currentX = e.clientX;
                }
                const deltaX = currentX - lastActionX;
                px += deltaX * sensitivity;
                lastActionX = currentX;
            }
            if (e.cancelable) e.preventDefault();
        }

        function handleActionEnd() {
            keys['Action'] = false;
            lastActionX = null; 
        }

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                if (gameState === 'IDLE') startTransition();
                else if (gameState === 'GAME OVER') location.reload();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        window.addEventListener('touchstart', handleActionStart, { passive: false });
        window.addEventListener('touchmove', handleActionMove, { passive: false });
        window.addEventListener('touchend', handleActionEnd);
        window.addEventListener('mousedown', (e) => {
            if(e.button === 0) handleActionStart(e); 
        });
        window.addEventListener('mousemove', (e) => {
            if(keys['Action']) handleActionMove(e);
        });
        window.addEventListener('mouseup', handleActionEnd);

        function startTransition() {
            gameState = 'TRANSITION';
            document.body.classList.add('game-active');
            ghost.style.display = 'block';
            setTimeout(() => {
                ghost.style.bottom = '40%'; 
            }, 50);

            setTimeout(() => {
                startGame();
            }, 1200);
        }

        function startGame() {
            canvas.style.display = 'block';
            scoreElement.style.display = 'block';
            ghost.style.transition = 'none'; 
            const rect = ghost.getBoundingClientRect();
            px = rect.left;
            py = rect.top;
            vy = -2; 
            ghost.style.transform = 'none';
            ghost.style.margin = '0';
            gameState = 'PLAYING';
            gameLoop();
        }

        function generateOffsets() {
            const offset = 4;
            return Array.from({ length: 12 }, () => (Math.random() - 0.5) * offset);
        }

        function createObstacle(customX, customY) {
            const size = 30 + Math.random() * 50;
            obstacles.push({
                x: customX ?? Math.random() * (canvas.width - size),
                y: customY ?? -size,
                w: size,
                h: size,
                speed: 3 + (score * 0.1),
                vx: (Math.random() - 0.5) * 10, 
                vy: (Math.random() - 0.5) * 10,
                offsets: generateOffsets(),
                lastUpdate: Date.now()
            });
        }

        function createCoin(customX, customY) {
            const size = 30;
            coins.push({
                x: customX ?? Math.random() * (canvas.width - size),
                y: customY ?? -size,
                w: size,
                h: size,
                speed: 2.5 + (score * 0.05),
                vx: (Math.random() - 0.5) * 12,
                vy: (Math.random() - 0.5) * 12,
                offsets: generateOffsets(),
                lastUpdate: Date.now()
            });
        }

        function createCandy() {
            const size = 30;
            candies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                w: size,
                h: size,
                speed: 3,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                offsets: generateOffsets(),
                lastUpdate: Date.now()
            });
        }

        function activateChaosMode() {
            isChaosMode = true;
            scoreElement.classList.add('chaos-active');
            if(chaosTimer) clearTimeout(chaosTimer);
            chaosTimer = setTimeout(() => {
                isChaosMode = false;
                scoreElement.classList.remove('chaos-active');
                chaosTimer = null;
            }, 15000);
        }

        // 修改 2: 实现碰到糖果的第四种模式 (障碍变硬币)
        function activateMidasMode() {
            isMidasMode = true;
            if(midasTimer) clearTimeout(midasTimer);
            midasTimer = setTimeout(() => {
                isMidasMode = false;
                midasTimer = null;
            }, 10000);
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color: color
                });
            }
        }

        function drawHandDrawnPath(x, y, w, h, off) {
            ctx.beginPath();
            ctx.moveTo(x + off[0], y + off[1]);
            ctx.quadraticCurveTo(x + w/2 + off[2], y + off[3], x + w + off[4], y + off[5]);
            ctx.quadraticCurveTo(x + w + off[6], y + h/2 + off[7], x + w + off[8], y + h + off[9]);
            ctx.quadraticCurveTo(x + w/2 + off[0], y + h + off[1], x + off[2], y + h + off[3]);
            ctx.quadraticCurveTo(x + off[4], y + h/2 + off[5], x + off[6], y + off[7]);
            ctx.closePath();
        }

        function drawHandDrawnStar(x, y, w, h, off) {
            const cx = x + w/2;
            const cy = y + h/2;
            ctx.beginPath();
            ctx.moveTo(cx + off[0], y + off[1]);
            ctx.quadraticCurveTo(cx + off[2], cy + off[3], x + w + off[4], cy + off[5]);
            ctx.quadraticCurveTo(cx + off[6], cy + off[7], cx + off[8], y + h + off[9]);
            ctx.quadraticCurveTo(cx + off[1], cy + off[2], x + off[3], cy + off[4]);
            ctx.quadraticCurveTo(cx + off[5], cy + off[6], cx + off[0], y + off[1]);
            ctx.closePath();
        }

        function drawCandy(obj) {
            const now = Date.now();
            if (now - obj.lastUpdate > 300) {
                obj.offsets = generateOffsets();
                obj.lastUpdate = now;
            }
            const {x, y, w, h, offsets: off} = obj;
            ctx.save();
            const strokeColor = '#1e40af'; 
            const fillColor = '#a5f3fc';   
            ctx.fillStyle = fillColor;
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x + off[0], y + h/2 + off[1]);
            ctx.lineTo(x - 12 + off[2], y + off[3]);
            ctx.lineTo(x - 12 + off[4], y + h + off[5]);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + w + off[6], y + h/2 + off[7]);
            ctx.lineTo(x + w + 12 + off[8], y + off[9]);
            ctx.lineTo(x + w + 12 + off[10], y + h + off[11]);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = fillColor;
            ctx.beginPath();
            ctx.moveTo(x + off[0], y + h/2 + off[1]);
            ctx.bezierCurveTo(x + off[2], y + off[3], x + w + off[4], y + off[5], x + w + off[6], y + h/2 + off[7]);
            ctx.bezierCurveTo(x + w + off[8], y + h + off[9], x + off[10], y + h + off[11], x + off[0], y + h/2 + off[1]);
            ctx.fill();
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();
        }

        function drawObstacle(obj) {
            const now = Date.now();
            if (now - obj.lastUpdate > 500) {
                obj.offsets = generateOffsets();
                obj.lastUpdate = now;
            }
            ctx.save();
            if(isMidasMode) {
                ctx.fillStyle = '#facc15';
                drawHandDrawnStar(obj.x, obj.y, obj.w, obj.h, obj.offsets);
                ctx.fill();
                ctx.strokeStyle = '#854d0e';
            } else {
                ctx.fillStyle = '#ffffff'; 
                drawHandDrawnPath(obj.x, obj.y, obj.w, obj.h, obj.offsets);
                ctx.fill();
                ctx.strokeStyle = '#141414';
            }
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();
        }

        function drawCoin(obj) {
            const now = Date.now();
            if (now - obj.lastUpdate > 300) {
                obj.offsets = generateOffsets();
                obj.lastUpdate = now;
            }
            ctx.save();
            ctx.fillStyle = '#facc15';
            drawHandDrawnStar(obj.x, obj.y, obj.w, obj.h, obj.offsets);
            ctx.fill();
            ctx.strokeStyle = '#854d0e';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
        }

        function updateObjectPos(o) {
            if (isChaosMode) {
                o.x += o.vx + (Math.sin(frameCount * 0.1) * 2); 
                o.y += o.speed + o.vy * 0.25; 
                if (o.x < 0 || o.x > canvas.width - o.w) o.vx *= -1;
            } else {
                o.y += o.speed;
            }
        }

        function gameLoop() {
            if (gameState !== 'PLAYING') return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (keys['Space']) {
                vy += flyPowerKbd;
            } else if (keys['Action']) {
                if (vy > touchCruiseSpeed) {
                    vy += flyPowerTouch;
                } else {
                    vy = touchCruiseSpeed; 
                }
            } else {
                vy += gravity;
            }
            
            if (vy > maxSpeed) vy = maxSpeed;
            if (vy < -maxSpeed) vy = -maxSpeed;
            py += vy;

            if (keys['KeyA'] || keys['ArrowLeft']) px -= moveSpeed;
            if (keys['KeyD'] || keys['ArrowRight']) px += moveSpeed;

            if (py < 0) { py = 0; vy = 0.5; }
            if (py > canvas.height) { endGame(); return; }
            if (px < 0) px = 0;
            if (px > canvas.width - 50) px = canvas.width - 50;

            ghost.style.top = py + 'px';
            ghost.style.left = px + 'px';

            if (frameCount % 60 === 0) createObstacle();
            if (frameCount % 90 === 0) createCoin();
            if (frameCount % 300 === 0) createCandy(); 

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                updateObjectPos(o);
                drawObstacle(o);
                if (px < o.x + o.w && px + 40 > o.x && py < o.y + o.h && py + 40 > o.y) {
                    // 修改 2: 点金手模式下，碰到障碍物变为加分而非死亡
                    if (isMidasMode) {
                        obstacles.splice(i, 1);
                        score++;
                        scoreElement.innerText = score;
                        createExplosion(o.x + o.w/2, o.y + o.h/2, '#facc15');
                    } else {
                        endGame(); return;
                    }
                }
                if (!isChaosMode && o.y > canvas.height) obstacles.splice(i, 1);
            }
            for (let i = coins.length - 1; i >= 0; i--) {
                let c = coins[i];
                updateObjectPos(c);
                drawCoin(c);
                if (px < c.x + c.w && px + 40 > c.x && py < c.y + c.h && py + 40 > c.y) {
                    coins.splice(i, 1);
                    score++;
                    scoreElement.innerText = score;
                    continue;
                }
                if (!isChaosMode && c.y > canvas.height) coins.splice(i, 1);
            }
            for (let i = candies.length - 1; i >= 0; i--) {
                let candy = candies[i];
                updateObjectPos(candy);
                drawCandy(candy);
                if (px < candy.x + candy.w && px + 40 > candy.x && py < candy.y + candy.h && py + 40 > candy.y) {
                    createExplosion(candy.x + candy.w/2, candy.y + candy.h/2, '#a5f3fc');
                    const rand = Math.random();
                    // 修改 2: 重新分配概率实现第四种模式 (15% 概率)
                    if (rand < 0.35) { // 35% 喷发硬币
                        const burstCount = 3 + Math.floor(Math.random() * 3);
                        for(let j=0; j<burstCount; j++) {
                            const spread = (j - (burstCount - 1) / 2) * 60; 
                            createCoin(candy.x + spread, candy.y - 150);
                        }
                    } else if (rand < 0.70) { // 35% 喷发障碍
                        const burstCount = 3 + Math.floor(Math.random() * 3);
                        for(let j=0; j<burstCount; j++) {
                            const spread = (j - (burstCount - 1) / 2) * 60; 
                            createObstacle(candy.x + spread, candy.y - 150);
                        }
                    } else if (rand < 0.85) { // 15% 混乱模式
                        activateChaosMode();
                    } else { // 15% 点金手模式 (新增)
                        activateMidasMode();
                    }
                    candies.splice(i, 1);
                    continue;
                }
                if (!isChaosMode && candy.y > canvas.height) candies.splice(i, 1);
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 6, 6);
                ctx.globalAlpha = 1.0;
                if (p.life <= 0) particles.splice(i, 1);
            }
            frameCount++;
            animationId = requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameState = 'GAME OVER';
            cancelAnimationFrame(animationId);
            if(chaosTimer) clearTimeout(chaosTimer);
            if(midasTimer) clearTimeout(midasTimer);

            document.body.classList.remove('game-active');
            canvas.style.display = 'none';
            scoreElement.style.display = 'none';
            ghost.style.display = 'none';

            displayCode.style.fontFamily = 'Consolas, monospace';
            displayCode.innerHTML = 'GAME OVER!';
            displayMsg.innerHTML = `Your Score: ${score}<br>Press <span class="kbd-key">SPACE</span> or Tap to try again!`;
        }
    </script>
</body>
</html>
